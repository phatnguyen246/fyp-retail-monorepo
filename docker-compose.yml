services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend
    environment:
      MONGODB_URI: mongodb://mongo:27017/fyp-retail
      NODE_ENV: development
      PNPM_STORE_DIR: /app/pnpm-store
      CI: "true"
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/app/.pnpm-store
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
    command: pnpm --filter @apps/backend dev
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    environment:
      NODE_ENV: development
      PNPM_STORE_DIR: /app/pnpm-store
      CI: "true"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - pnpm_store:/app/pnpm-store
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
    command: pnpm --filter @apps/frontend exec vite --host 0.0.0.0 --port 5173
    restart: unless-stopped

volumes:
  mongo_data:
  pnpm_store:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
