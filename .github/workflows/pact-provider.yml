name: Pact Provider

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      shared_changed: ${{ steps.filter.outputs.shared }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            frontend:
              - 'apps/frontend/**'
            shared:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  verify:
    if: needs.detect-changes.outputs.backend_changed == 'true' || needs.detect-changes.outputs.shared_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: detect-changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify provider against PactFlow contracts
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACTICIPANT_VERSION: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          CONSUMER_BRANCH: main
        run: |
          docker compose run --rm --no-deps \
            -e PACT_BROKER_URL \
            -e PACT_BROKER_TOKEN \
            -e PACTICIPANT_VERSION \
            -e GIT_BRANCH \
            -e CONSUMER_BRANCH \
            backend /bin/bash -lc \
            "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @apps/backend test:pact"

  deployment-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.detect-changes.outputs.backend_changed == 'true' || needs.detect-changes.outputs.shared_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - detect-changes
      - verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment gate (can-i-deploy)
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACTICIPANT_VERSION: ${{ github.sha }}
          TARGET_ENV: production
        run: |
          set +e
          OUTPUT=$(docker compose run --rm --no-deps \
            -e PACT_BROKER_URL \
            -e PACT_BROKER_TOKEN \
            -e PACTICIPANT_VERSION \
            -e TARGET_ENV \
            backend /bin/bash -lc \
            "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @apps/backend pact:can-i-deploy" 2>&1)
          STATUS=$?
          set -e

          echo "$OUTPUT"

          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi

          if echo "$OUTPUT" | grep -q "No pacts or verifications have been published for version"; then
            echo "can-i-deploy is non-blocking for this provider-version strategy; verification job is the hard gate."
            exit 0
          fi

          exit "$STATUS"

  render-deploy-backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.detect-changes.outputs.backend_changed == 'true' || needs.detect-changes.outputs.shared_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - detect-changes
      - deployment-gate

    steps:
      - name: Trigger Render backend deploy hook
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            "$RENDER_BACKEND_DEPLOY_HOOK_URL"

  render-deploy-frontend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.detect-changes.outputs.frontend_changed == 'true' || needs.detect-changes.outputs.shared_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: detect-changes

    steps:
      - name: Trigger Render frontend deploy hook
        env:
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            "$RENDER_FRONTEND_DEPLOY_HOOK_URL"
