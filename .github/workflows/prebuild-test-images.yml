name: Prebuild Test Images

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: prebuild-test-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAMESPACE: ghcr.io/${{ github.repository }}
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Buildx local cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-test-images-${{ github.ref_name }}-${{ hashFiles('apps/backend/Dockerfile', 'apps/frontend/Dockerfile', 'apps/frontend/Dockerfile.e2e', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-test-images-${{ github.ref_name }}-
            ${{ runner.os }}-buildx-test-images-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/backend-test:${{ env.IMAGE_TAG }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_NAMESPACE }}/backend-test:buildcache
            type=local,src=/tmp/.buildx-cache
          cache-to: |
            type=registry,ref=${{ env.IMAGE_NAMESPACE }}/backend-test:buildcache,mode=max
            type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Refresh Buildx local cache after backend image
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build and push frontend-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/frontend-test:${{ env.IMAGE_TAG }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_NAMESPACE }}/frontend-test:buildcache
            type=local,src=/tmp/.buildx-cache
          cache-to: |
            type=registry,ref=${{ env.IMAGE_NAMESPACE }}/frontend-test:buildcache,mode=max
            type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Refresh Buildx local cache after frontend image
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build and push frontend-e2e-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile.e2e
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/frontend-e2e-test:${{ env.IMAGE_TAG }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_NAMESPACE }}/frontend-e2e-test:buildcache
            type=local,src=/tmp/.buildx-cache
          cache-to: |
            type=registry,ref=${{ env.IMAGE_NAMESPACE }}/frontend-e2e-test:buildcache,mode=max
            type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Refresh Buildx local cache after frontend-e2e image
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
