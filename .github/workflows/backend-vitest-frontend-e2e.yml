name: Backend Vitest + Frontend E2E

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-vitest-host:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (host runner)
        run: pnpm install --frozen-lockfile

      - name: Run backend Vitest on host
        run: |
          mkdir -p apps/backend/test-results
          pnpm --filter @apps/backend exec vitest run --config vitest.config.ci.js

      - name: Publish backend Vitest report (JUnit)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Vitest
          path: apps/backend/test-results/vitest-junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Collect backend Vitest artifacts
        if: always()
        run: |
          mkdir -p artifacts
          cp -R apps/backend/test-results ./artifacts/backend-test-results || true

      - name: Upload backend Vitest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-vitest-artifacts
          retention-days: 14
          path: |
            artifacts/backend-test-results
          if-no-files-found: warn

  frontend-e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: read
    env:
      TEST_IMAGE_TAG: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt test images
        id: pull_images
        continue-on-error: true
        run: |
          docker pull ghcr.io/${GITHUB_REPOSITORY}/backend-test:${TEST_IMAGE_TAG}
          docker pull ghcr.io/${GITHUB_REPOSITORY}/frontend-test:${TEST_IMAGE_TAG}
          docker pull ghcr.io/${GITHUB_REPOSITORY}/frontend-e2e-test:${TEST_IMAGE_TAG}

      - name: Set up Docker Buildx (fallback)
        if: steps.pull_images.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Build fallback backend-test image
        if: steps.pull_images.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository }}/backend-test:${{ env.TEST_IMAGE_TAG }}

      - name: Build fallback frontend-test image
        if: steps.pull_images.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend-test:${{ env.TEST_IMAGE_TAG }}

      - name: Build fallback frontend-e2e-test image
        if: steps.pull_images.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile.e2e
          load: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend-e2e-test:${{ env.TEST_IMAGE_TAG }}

      - name: Create CI env files from secrets
        run: |
          printf "%s" "${{ secrets.BACKEND_ENV_FILE }}" > apps/backend/.env.ci
          printf "%s" "${{ secrets.FRONTEND_ENV_FILE }}" > apps/frontend/.env.ci

      - name: Start stack for E2E
        run: docker compose -f compose.ci.yml up -d mongo backend frontend

      - name: Wait for /register route readiness
        run: |
          for i in {1..90}; do
            if docker compose -f compose.ci.yml exec -T frontend /bin/bash -lc "node -e \"fetch('http://localhost:5173/register').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))\""; then
              echo "/register is ready"
              exit 0
            fi
            sleep 2
          done
          echo "/register is not ready in time" >&2
          exit 1

      - name: Run frontend Playwright E2E
        id: e2e
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "E2E mode: smoke (register/login flow)"
            E2E_CMD="pnpm --filter @apps/frontend exec playwright test tests/e2e/auth-register-login.e2e.spec.js --reporter=line,html"
          else
            echo "E2E mode: full suite"
            E2E_CMD="pnpm --filter @apps/frontend exec playwright test --reporter=line,html"
          fi

          docker compose -f compose.ci.yml run --no-deps --name frontend-e2e-ci -e E2E_BASE_URL=http://frontend:5173 frontend-e2e /bin/bash -lc "$E2E_CMD"

      - name: Collect frontend E2E artifacts from container
        if: always()
        run: |
          mkdir -p artifacts
          docker cp frontend-e2e-ci:/app/apps/frontend/playwright-report ./artifacts/playwright-report || true
          docker cp frontend-e2e-ci:/app/apps/frontend/test-results ./artifacts/test-results || true

      - name: Upload frontend E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-artifacts
          retention-days: 14
          path: |
            artifacts/playwright-report
            artifacts/test-results
          if-no-files-found: warn

      - name: Show logs on failure
        if: steps.e2e.outcome == 'failure'
        run: docker compose -f compose.ci.yml logs backend frontend mongo

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f frontend-e2e-ci >/dev/null 2>&1 || true
          docker compose -f compose.ci.yml down -v

      - name: Fail job if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
