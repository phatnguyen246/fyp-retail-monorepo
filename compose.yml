name: fyp-retail-system

services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    image: node:24-bookworm-slim
    env_file:
      - ./apps/backend/.env.dev
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - pnpm_store:/app/.pnpm-store
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
    command:
      - /bin/bash
      - -lc
      - corepack enable && pnpm install --filter @apps/backend && pnpm --filter @apps/backend dev
    restart: unless-stopped

  frontend:
    image: node:24-bookworm-slim
    env_file:
      - ./apps/frontend/.env.dev
    depends_on:
      - backend
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - .:/app
      - pnpm_store:/app/.pnpm-store
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
    command:
      - /bin/bash
      - -lc
      - corepack enable && pnpm install --filter @apps/frontend && pnpm --filter @apps/frontend exec vite --host 0.0.0.0 --port 5173
    restart: unless-stopped

volumes:
  mongo_data:
  pnpm_store:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
